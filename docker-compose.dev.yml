version: "3.8"

services:
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    image: job-collector:latest
    container_name: job_collector
    restart: unless-stopped

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobradar_db
      DB_USER: jobradar
      DB_PASSWORD: jobradar123

    volumes:
      - ./collector:/app
      - ./data:/app/data

    networks:
      - homelab

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: job-dashboard:latest
    container_name: job_dashboard
    restart: unless-stopped

    ports:
      - "8501:8501"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobradar_db
      DB_USER: jobradar
      DB_PASSWORD: jobradar123

    volumes:
      - ./dashboard:/app

    networks:
      - homelab

networks:
  homelab:
    external: true